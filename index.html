<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme by Number</title>
    <link rel="stylesheet" href="bootstrap.min.css">
</head>
<body>
<div class="container my-5">
    <h1 class="text-center mb-4">Meme by Number</h1>
    <div class="row justify-content-center mb-3">
        <div class="col-md-4">
            <input type="number" id="numberInput" class="form-control" placeholder="Enter number 1-100" min="1" max="100">
        </div>
        <div class="col-md-2">
            <button id="showMemeBtn" class="btn btn-primary w-100">Show Meme</button>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div id="memeContainer"></div>
        </div>
    </div>
</div>
<script src="script.js"></script>
<script src="bootstrap.bundle.js"></script>
</body>
</html>
